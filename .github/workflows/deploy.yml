name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate package.json (no platform-specific deps)
        run: |
          node -e "
          const pkg = require('./package.json');
          const allDeps = {...(pkg.dependencies || {}), ...(pkg.devDependencies || {})};
          const bad = Object.keys(allDeps).filter(k =>
            /@rollup\/rollup-(linux|darwin|win32|android)/.test(k) ||
            /@esbuild\/(linux|darwin|win32|android)/.test(k)
          );
          if (bad.length > 0) {
            console.error('ERROR: Paquetes de plataforma en dependencies:', bad.join(', '));
            console.error('Estos paquetes son manejados internamente por rollup/vite.');
            console.error('Eliminados con: npm uninstall ' + bad.join(' '));
            process.exit(1);
          }
          console.log('package.json OK — sin paquetes de plataforma');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build with Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
